{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
  <div style="width:100%; max-width:420px;">
    <!-- Logo -->
    <div class="text-center mb-24" style="animation: fadeUp 0.5s ease forwards;">
      <div style="display:inline-flex; align-items:center; gap:12px; margin-bottom:8px;">
        <div class="logo-icon" style="width:56px;height:56px;font-size:28px;">🏋️</div>
        <span class="logo-text" style="font-size:28px;">SmartGym</span>
      </div>
      <p class="text-muted text-sm">AI-Powered Fitness Management</p>
    </div>

    <div class="card fade-up" style="animation-delay:0.1s; padding:36px;">
      <h1 class="text-xl fw-800 mb-8">Welcome back 👋</h1>
      <p class="text-muted text-sm mb-24">Sign in to continue your fitness journey</p>

      <form method="POST">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center; padding:14px;">
          Sign In →
        </button>
      </form>

      <div style="text-align:center; margin-top:20px;">
        <span class="text-muted text-sm">Don't have an account? </span>
        <a href="{{ url_for('auth.register') }}" style="color:var(--purple-light); font-weight:600; font-size:13px; text-decoration:none;">Create one →</a>
      </div>
    </div>

    <!-- Demo credentials -->
    <div class="card fade-up" style="animation-delay:0.2s; padding:16px; margin-top:16px; text-align:center;">
      <p class="text-xs text-muted">🔒 Demo: <strong style="color:var(--text-secondary)">demo@smartgym.ai</strong> / <strong style="color:var(--text-secondary)">demo123</strong></p>
    </div>
  </div>
</div>
{% endblock %}
