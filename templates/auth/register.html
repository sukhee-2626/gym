{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px;">
  <div style="width:100%; max-width:560px;">
    <div class="text-center mb-24 fade-up">
      <div style="display:inline-flex; align-items:center; gap:12px; margin-bottom:8px;">
        <div class="logo-icon" style="width:56px;height:56px;font-size:28px;">🏋️</div>
        <span class="logo-text" style="font-size:28px;">SmartGym</span>
      </div>
      <p class="text-muted text-sm">Join the AI-powered fitness revolution</p>
    </div>

    <div class="card fade-up" style="animation-delay:0.1s; padding:36px;">
      <h1 class="text-xl fw-800 mb-8">Create your account 🚀</h1>
      <p class="text-muted text-sm mb-24">Fill in your details to get a personalized AI fitness plan</p>

      <form method="POST">
        <div class="grid grid-2" style="gap:16px;">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" placeholder="Raj Kumar" required>
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="tel" name="phone" class="form-control" placeholder="+91 9999999999">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Minimum 6 characters" required>
        </div>

        <div class="grid grid-2" style="gap:16px;">
          <div class="form-group">
            <label class="form-label">Gender</label>
            <select name="gender" class="form-control">
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Age</label>
            <input type="number" name="age" class="form-control" placeholder="25" min="10" max="80">
          </div>
          <div class="form-group">
            <label class="form-label">Weight (kg)</label>
            <input type="number" name="weight" class="form-control" placeholder="70" step="0.1">
          </div>
          <div class="form-group">
            <label class="form-label">Height (cm)</label>
            <input type="number" name="height" class="form-control" placeholder="175" step="0.1">
          </div>
        </div>

        <div class="grid grid-2" style="gap:16px;">
          <div class="form-group">
            <label class="form-label">Fitness Goal</label>
            <select name="goal" class="form-control">
              <option value="lose_weight">🔥 Lose Weight</option>
              <option value="gain_muscle">💪 Gain Muscle</option>
              <option value="maintain">⚖️ Maintain</option>
              <option value="endurance">🏃 Endurance</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Fitness Level</label>
            <select name="level" class="form-control">
              <option value="beginner">🌱 Beginner</option>
              <option value="intermediate">⚡ Intermediate</option>
              <option value="advanced">🔥 Advanced</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Daily Food Budget (₹)</label>
          <input type="number" name="budget" class="form-control" placeholder="150" value="150" step="10">
        </div>

        <button type="submit" class="btn btn-primary w-full" style="justify-content:center; padding:14px; margin-top:8px;">
          Create Account & Get AI Plan →
        </button>
      </form>

      <div style="text-align:center; margin-top:20px;">
        <span class="text-muted text-sm">Already have an account? </span>
        <a href="{{ url_for('auth.login') }}" style="color:var(--purple-light); font-weight:600; font-size:13px; text-decoration:none;">Sign in →</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
